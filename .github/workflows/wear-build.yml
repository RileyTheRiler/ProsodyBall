name: Build Wear OS APK

# Builds the sideloadable debug APK for the Galaxy Watch 7 (Wear OS).
# Download it from the run's "Artifacts" section, then follow wear/README.md.

on:
  push:
    branches:
      - "claude/wear-os-smartwatch-support-**"
    paths:
      - "wear/**"
      - ".github/workflows/wear-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        working-directory: wear
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vox-ball-wear-debug-apk
          path: wear/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
